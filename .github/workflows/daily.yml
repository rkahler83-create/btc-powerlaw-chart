# .github/workflows/daily.yml

name: Render PowerLaw PNG

on:
  push:
    branches: [ main ]

  schedule:
    - cron: "10 3 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib yfinance pandas numpy

      - name: Render chart
        run: |
          mkdir -p docs
          python Skripte/render_powerlaw.py

      - name: Commit PNG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/powerlaw.png
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update powerlaw chart"
          git push
