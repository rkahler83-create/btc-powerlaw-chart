name: Render PowerLaw PNG

on:
  schedule:
    - cron: "10 3 * * *"   # täglich um 03:10 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib

      - name: Render chart
        run: |
          mkdir -p docs
          python Skripte/render_powerlaw.py

      - name: Commit PNG
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/powerlaw.png
          git commit -m "Update powerlaw chart" || echo "No changes"
          git push
